<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Dockside Grill CMS</title>
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Supabase CDN (If they decide to integrate it later) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Shared Config -->
  <script src="../config.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
    
    :root {
      --primary: #0a5f70;
      --secondary: #ff7a39;
      --dark-bg: #090e12;
      --text-light: #f4f6f7;
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.12);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-image: linear-gradient(135deg, rgba(9, 14, 18, 0.95), rgba(10, 95, 112, 0.85)), url('../unnamed.jpg');
      background-size: cover;
      background-position: center;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      overflow: hidden;
    }

    .login-container {
      width: 90%;
      max-width: 420px;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    .login-logo {
      width: 60px;
      height: 60px;
      background: var(--secondary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 1.8rem;
      font-weight: bold;
      margin: 0 auto 20px auto;
      box-shadow: 0 4px 15px rgba(255, 122, 57, 0.4);
    }

    .login-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .login-subtitle {
      font-size: 0.9rem;
      color: #a0aab2;
      margin-bottom: 35px;
    }

    .form-group {
      margin-bottom: 22px;
      text-align: left;
      position: relative;
    }

    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #a0aab2;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #a0aab2;
      font-size: 1rem;
    }

    .form-input {
      width: 100%;
      padding: 14px 15px 14px 45px;
      border-radius: 10px;
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s ease;
    }

    .form-input:focus {
      border-color: var(--secondary);
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 10px rgba(255, 122, 57, 0.15);
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 10px;
      box-shadow: 0 4px 15px rgba(10, 95, 112, 0.3);
      transition: all 0.3s ease;
    }

    .btn-submit:hover {
      background: #128299;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(10, 95, 112, 0.4);
    }

    .error-msg {
      color: #ff5252;
      font-size: 0.85rem;
      margin-top: 15px;
      display: none;
    }

    .demo-info {
      margin-top: 30px;
      font-size: 0.75rem;
      color: #a0aab2;
      background: rgba(255, 255, 255, 0.03);
      padding: 10px;
      border-radius: 8px;
      border: 1px dashed var(--glass-border);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-logo">D</div>
    <h1 class="login-title">Dockside Grill</h1>
    <p class="login-subtitle">Content Management Dashboard</p>
    
    <form id="login-form">
      <div class="form-group">
        <label for="l-email" class="form-label">Email Address</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-envelope input-icon"></i>
          <input type="email" id="l-email" class="form-input" placeholder="admin@dockside.com" required>
        </div>
      </div>
      
      <div class="form-group">
        <label for="l-password" class="form-label">Password</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock input-icon"></i>
          <input type="password" id="l-password" class="form-input" placeholder="••••••••" required>
        </div>
      </div>
      
      <button type="submit" class="btn-submit">Sign In</button>
      
      <div class="error-msg" id="error-message">Invalid email or password. Please try again.</div>
    </form>
    
    <div class="demo-info" id="demo-badge">
      <i class="fa-solid fa-circle-info"></i> Running in <strong>Demo Mode</strong>.<br>Use <strong>admin@dockside.com</strong> / <strong>admin</strong> to log in.
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loginForm = document.getElementById('login-form');
      const errorMsg = document.getElementById('error-message');
      const demoBadge = document.getElementById('demo-badge');
      
      // Update badge if Supabase cloud is configured
      if (window.db && window.db.isCloud) {
        demoBadge.innerHTML = `<i class="fa-solid fa-cloud"></i> Connected to Supabase Cloud.<br>Use your database authentication credentials.`;
      }
      
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorMsg.style.display = 'none';
        
        const email = document.getElementById('l-email').value.trim();
        const password = document.getElementById('l-password').value;
        
        if (window.db && window.db.isCloud) {
          // Cloud Login
          try {
            const { data, error } = await window.db.client.auth.signInWithPassword({
              email: email,
              password: password
            });
            if (error) throw error;
            
            // Session saved automatically by Supabase client
            window.location.href = 'index.html';
          } catch (err) {
            console.error(err);
            errorMsg.innerText = err.message || "Login failed. Check credentials.";
            errorMsg.style.display = 'block';
          }
        } else {
          // Local storage demo mode login
          if (email === 'admin@dockside.com' && password === 'admin') {
            sessionStorage.setItem('dg_admin_logged_in', 'true');
            window.location.href = 'index.html';
          } else {
            errorMsg.innerText = "Invalid credentials. For demo mode use: admin@dockside.com / admin";
            errorMsg.style.display = 'block';
          }
        }
      });
    });
  </script>
</body>
</html>
